<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Alaska Bots Market — Боты на заказ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#06080f;--bg2:#0b0f24;
--accent:#6366f1;--accent2:#8b5cf6;--cyan:#06b6d4;
--green:#10b981;--yellow:#f59e0b;--red:#ef4444;
--txt:#e2e8f0;--dim:#8892a8;
--glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);
--bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.14);
--r:16px;--rs:10px;
}
html{scroll-behavior:smooth}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
color:var(--txt);background:var(--bg);
background-image:
radial-gradient(ellipse 1200px 600px at 5% 0%,rgba(99,102,241,.18),transparent),
radial-gradient(ellipse 800px 500px at 95% 5%,rgba(6,182,212,.12),transparent),
radial-gradient(ellipse 600px 400px at 50% 100%,rgba(139,92,246,.14),transparent);
min-height:100vh;padding-bottom:80px;overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;color:inherit;font-size:14px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:6px}
.wrap{max-width:1200px;margin:0 auto;padding:0 16px}

.hdr{position:sticky;top:0;z-index:90;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(6,8,15,.75);border-bottom:1px solid var(--bdr)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;max-width:1200px;margin:0 auto;gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:17px;flex-shrink:0}
.logo-m{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:grid;place-items:center;font-size:18px;box-shadow:0 4px 20px rgba(99,102,241,.5)}
.nav{display:flex;gap:2px}
.nav a{padding:8px 12px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--dim);transition:.2s}
.nav a:hover,.nav a.on{color:#fff;background:var(--glass2)}
.hdr-acts{display:flex;gap:6px}
.ib{width:38px;height:38px;border-radius:var(--rs);background:var(--glass);border:1px solid var(--bdr);display:grid;place-items:center;position:relative;transition:.2s;font-size:16px}
.ib:hover{background:var(--glass2);border-color:var(--bdr2)}
.badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:none;place-items:center;padding:0 4px}
.badge.show{display:grid}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--rs);font-weight:600;font-size:13px;transition:.2s;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.4)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.6)}
.btn-g{background:var(--glass);border:1px solid var(--bdr);color:var(--txt)}
.btn-g:hover{background:var(--glass2);border-color:var(--bdr2)}
.btn-s{padding:7px 12px;font-size:12px;border-radius:8px}
.btn-lg{padding:14px 24px;font-size:15px;border-radius:14px}
.btn-full{width:100%}
.btn-red{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.btn-green{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.25)}
.btn-yellow{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}

/* Promo strip */
.promo-strip{background:linear-gradient(90deg,rgba(239,68,68,.15),rgba(245,158,11,.15),rgba(239,68,68,.15));border-bottom:1px solid rgba(239,68,68,.2);padding:8px 16px;text-align:center;font-size:12px;font-weight:600;color:#fbbf24}
.promo-strip b{color:#fff}

.hero{padding:48px 0 32px}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:36px;align-items:center}
.hero h1{font-size:clamp(28px,4.5vw,52px);line-height:1.08;font-weight:800;letter-spacing:-.5px;margin-bottom:16px}
.grad{background:linear-gradient(90deg,#a5b4fc,#22d3ee,#c4b5fd);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--dim);font-size:15px;line-height:1.6;margin-bottom:24px;max-width:520px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.stats-row{display:flex;gap:24px;margin-top:32px;flex-wrap:wrap}
.stat-n{font-size:22px;font-weight:800;color:#fff}
.stat-l{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.hero-vis{position:relative;height:360px;border-radius:20px;overflow:hidden;background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(6,182,212,.08));border:1px solid var(--bdr)}
.hero-vis::before{content:'';position:absolute;inset:0;background:radial-gradient(300px 200px at 30% 30%,rgba(99,102,241,.3),transparent),radial-gradient(300px 200px at 70% 70%,rgba(6,182,212,.2),transparent)}
.fc{position:absolute;background:rgba(12,16,40,.8);backdrop-filter:blur(16px);border:1px solid var(--bdr2);border-radius:14px;padding:12px 14px;box-shadow:0 12px 40px rgba(0,0,0,.4);animation:fl 5s ease-in-out infinite}
.fc-r{display:flex;align-items:center;gap:8px}
.fc-i{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:16px}
.fc-t{font-size:12px;font-weight:600}
.fc-s{font-size:10px;color:var(--dim);margin-top:1px}
.fc1{top:24px;left:20px}.fc2{top:100px;right:20px;animation-delay:-1.5s}.fc3{bottom:60px;left:40px;animation-delay:-3s}.fc4{bottom:30px;right:40px;animation-delay:-.8s}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.feats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:32px 0}
.feat{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;transition:.25s}
.feat:hover{border-color:var(--bdr2);transform:translateY(-2px)}
.feat-i{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;margin-bottom:12px;background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(6,182,212,.12));border:1px solid var(--bdr2)}
.feat h3{font-size:14px;font-weight:700;margin-bottom:4px}
.feat p{font-size:12px;color:var(--dim);line-height:1.5}

.sec{padding:32px 0}
.sec-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.sec-h h2{font-size:24px;font-weight:700}
.sec-h p{color:var(--dim);font-size:13px;margin-top:4px}

.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.chip{padding:7px 13px;border-radius:99px;font-size:12px;font-weight:500;background:var(--glass);border:1px solid var(--bdr);color:var(--dim);transition:.2s;cursor:pointer}
.chip:hover{color:var(--txt);border-color:var(--bdr2)}
.chip.on{background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(139,92,246,.15));border-color:rgba(99,102,241,.45);color:#fff}

.g{display:grid;gap:16px}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}

.card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;transition:.25s;cursor:pointer;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;inset:0;border-radius:var(--r);background:linear-gradient(135deg,rgba(99,102,241,.06),transparent 50%);opacity:0;transition:.25s;pointer-events:none}
.card:hover{transform:translateY(-3px);border-color:var(--bdr2);box-shadow:0 16px 48px rgba(99,102,241,.15)}
.card:hover::after{opacity:1}
.card-top{display:flex;gap:12px;margin-bottom:10px}
.card-ico{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:22px;flex-shrink:0;background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(6,182,212,.15));border:1px solid var(--bdr2)}
.card-n{font-size:15px;font-weight:700}
.card-c{font-size:11px;color:var(--dim);margin-top:2px}
.card-d{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tag{font-size:10px;padding:3px 7px;border-radius:6px;background:rgba(99,102,241,.1);color:#a5b4fc;border:1px solid rgba(99,102,241,.18)}
.card-f{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bdr);gap:8px}
.price{font-size:18px;font-weight:800;color:#fff}
.price-from{font-size:10px;color:var(--dim);font-weight:400;margin-right:2px}
.price-old{font-size:12px;color:var(--dim);text-decoration:line-through;margin-right:6px;font-weight:400}
.rating{font-size:12px;color:#fbbf24}
.rating .cnt{color:var(--dim)}

/* Sale badge */
.sale-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;z-index:2;text-transform:uppercase;letter-spacing:.5px}

.modal-bg{position:fixed;inset:0;background:rgba(4,6,12,.8);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:linear-gradient(180deg,rgba(16,20,48,.97),rgba(8,12,30,.97));border:1px solid var(--bdr2);border-radius:20px;max-width:680px;width:100%;max-height:88vh;overflow-y:auto;padding:24px;position:relative;animation:mu .25s ease}
@keyframes mu{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-x{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:8px;background:var(--glass);display:grid;place-items:center;font-size:16px;z-index:2}
.modal-x:hover{background:var(--glass2)}

.bld{display:grid;grid-template-columns:300px 1fr 300px;gap:16px;min-height:650px}
.bld-p{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;backdrop-filter:blur(12px);overflow-y:auto;max-height:78vh}
.bld-p h3{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#a5b4fc;margin-bottom:14px;font-weight:700}
.bld-cat{margin-bottom:18px}
.bld-cat-title{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.blk{padding:12px;background:var(--glass2);border:1px solid var(--bdr);border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:12px;transition:.2s;cursor:pointer;user-select:none}
.blk:hover{border-color:var(--accent);background:rgba(99,102,241,.1);transform:translateX(2px)}
.blk .bi{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:18px;background:linear-gradient(135deg,rgba(99,102,241,.25),rgba(6,182,212,.15));flex-shrink:0}
.blk-info{flex:1;min-width:0}
.blk-n{font-weight:600;font-size:13px;margin-bottom:2px}
.blk-desc{font-size:10px;color:var(--dim);line-height:1.3}
.blk-p{font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}
.canvas{background:var(--glass);border:2px dashed var(--bdr);border-radius:var(--r);padding:16px;min-height:550px;transition:.2s}
.canvas-empty{text-align:center;padding:100px 20px;color:var(--dim);font-size:14px}
.canvas-empty .ce{font-size:56px;margin-bottom:14px;opacity:.4}
.pb{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));border:1px solid rgba(99,102,241,.25);border-radius:var(--rs);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;animation:si .25s ease;cursor:pointer;transition:.2s}
.pb:hover{border-color:var(--accent);background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.12));transform:translateX(3px)}
.pb.sel{border-color:var(--cyan);background:linear-gradient(135deg,rgba(6,182,212,.15),rgba(99,102,241,.1));box-shadow:0 0 0 2px rgba(6,182,212,.3)}
@keyframes si{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.pb .bi{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;background:linear-gradient(135deg,rgba(99,102,241,.25),rgba(6,182,212,.15));flex-shrink:0}
.pb-info{flex:1;min-width:0}
.pb-n{font-weight:600;font-size:14px;margin-bottom:3px}
.pb-p{font-size:12px;color:var(--dim)}
.pb-config{font-size:10px;color:var(--cyan);margin-top:2px;font-style:italic}
.pb-x{width:32px;height:32px;border-radius:8px;background:rgba(239,68,68,.15);color:#fca5a5;display:grid;place-items:center;font-size:16px;flex-shrink:0;transition:.2s}
.pb-x:hover{background:rgba(239,68,68,.3);transform:scale(1.1)}
.pbox{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1));border:1px solid rgba(99,102,241,.3);border-radius:14px;padding:18px;margin-top:16px}
.pbox .pl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.pbox .pv{font-size:28px;font-weight:800;margin-top:4px;color:#fff}
.pbd{margin-top:12px;font-size:11px;color:var(--dim)}
.pbd div{display:flex;justify-content:space-between;padding:3px 0}
.pbd .tot{border-top:1px solid var(--bdr);margin-top:8px;padding-top:8px;font-weight:700;color:var(--txt);font-size:13px}
.bld-templates{margin-top:18px;padding-top:18px;border-top:1px solid var(--bdr)}
.bld-tpl{padding:12px;background:var(--glass2);border:1px solid var(--bdr);border-radius:var(--rs);margin-bottom:8px;cursor:pointer;transition:.2s;font-size:12px}
.bld-tpl:hover{border-color:var(--accent);background:rgba(99,102,241,.1)}
.bld-tpl-n{font-weight:600;margin-bottom:3px;font-size:13px}
.bld-tpl-d{font-size:10px;color:var(--dim)}

.config-panel{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-top:16px}
.config-panel h4{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--cyan)}
.cfg-field{margin-bottom:12px}
.cfg-field label{display:block;font-size:11px;font-weight:600;margin-bottom:4px;color:var(--dim)}
.cfg-field input,.cfg-field select,.cfg-field textarea{width:100%;padding:8px 10px;background:var(--glass2);border:1px solid var(--bdr);border-radius:8px;font-size:12px;color:var(--txt)}
.cfg-field input:focus,.cfg-field select:focus,.cfg-field textarea:focus{outline:none;border-color:var(--accent)}
.cfg-field textarea{min-height:60px;resize:vertical}
.cfg-check{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;cursor:pointer}
.cfg-check input{width:auto;cursor:pointer}

.req-card{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:12px;transition:.2s}
.req-card:hover{border-color:var(--bdr2)}
.req-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.req-id{font-weight:700;font-size:15px}
.req-date{font-size:11px;color:var(--dim);margin-top:2px}
.req-status{font-size:11px;padding:4px 10px;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.st-new{background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
.st-progress{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.st-ready{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
.st-done{background:rgba(148,163,184,.15);color:#cbd5e1;border:1px solid rgba(148,163,184,.3)}
.req-block{padding:10px;background:var(--glass2);border-radius:8px;margin-bottom:8px;font-size:12px}
.req-block-t{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:4px;font-weight:700}
.req-block-v{color:var(--txt);line-height:1.5;white-space:pre-wrap}
.req-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}

.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--dim)}
.fi{width:100%;padding:10px 12px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--rs);font-size:13px;transition:.2s}
.fi:focus{outline:none;border-color:var(--accent);background:var(--glass2)}
textarea.fi{min-height:80px;resize:vertical}

.chat{display:flex;flex-direction:column;height:440px;background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.4}
.msg-in{background:var(--glass2);align-self:flex-start;border-bottom-left-radius:3px}
.msg-out{background:linear-gradient(135deg,var(--accent),var(--accent2));align-self:flex-end;border-bottom-right-radius:3px}
.msg-tm{font-size:9px;opacity:.5;margin-top:3px}
.chat-in{display:flex;gap:6px;padding:10px;border-top:1px solid var(--bdr)}
.chat-in input{flex:1}

.tkt{padding:12px;background:var(--glass);border:1px solid var(--bdr);border-radius:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(16,185,129,.92);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(16,185,129,.4);animation:ti .25s ease;pointer-events:none}
@keyframes ti{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

.view{display:none}.view.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}

.sbox{position:relative;margin-bottom:16px}
.sbox input{width:100%;padding:12px 12px 12px 40px;background:var(--glass);border:1px solid var(--bdr);border-radius:12px;font-size:13px}
.sbox input:focus{outline:none;border-color:var(--accent)}
.sbox::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.4}

.empty{text-align:center;padding:48px 16px;color:var(--dim)}
.empty .ei{font-size:48px;margin-bottom:10px;opacity:.35}
.empty h3{color:var(--txt);font-size:16px;margin-bottom:4px}

.pban{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1),rgba(6,182,212,.08));border:1px solid rgba(99,102,241,.25);border-radius:18px;padding:24px;margin:32px 0;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;position:relative;overflow:hidden}
.pban::before{content:'';position:absolute;top:-40%;right:-15%;width:300px;height:300px;background:radial-gradient(circle,rgba(139,92,246,.2),transparent 70%);pointer-events:none}
.pban h3{font-size:20px;font-weight:700;margin-bottom:4px}
.pban p{color:var(--dim);font-size:13px}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:80;background:rgba(6,8,15,.9);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);display:none}
.bnav-in{display:flex;justify-content:space-around;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bni{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 8px;font-size:9px;color:var(--dim);transition:.2s}
.bni.on{color:var(--accent)}
.bni span:first-child{font-size:18px}

.gstats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.gs{background:var(--glass);padding:6px;border-radius:6px;text-align:center}
.gs .gl{font-size:10px;color:var(--dim)}.gs .gv{font-weight:700;font-size:12px;margin-top:1px}

.checkout-box{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-top:16px}
.checkout-summary{padding:14px;background:var(--glass2);border-radius:10px;margin-bottom:16px}
.checkout-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.checkout-total{border-top:1px solid var(--bdr);margin-top:8px;padding-top:8px;font-weight:800;font-size:16px}
.info-box{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.25);border-radius:10px;padding:12px;font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:16px}
.info-box b{color:var(--cyan)}

.atabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.atab{padding:8px 14px;border-radius:8px;background:var(--glass);border:1px solid var(--bdr);font-size:12px;font-weight:500;color:var(--dim);transition:.2s}
.atab:hover{color:var(--txt)}
.atab.on{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.12));border-color:rgba(99,102,241,.35);color:#fff}
.sc{background:var(--glass);border:1px solid var(--bdr);border-radius:var(--r);padding:16px}
.sc .sv{font-size:24px;font-weight:800;margin:4px 0}
.sc .sl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.sc .sd{font-size:11px;margin-top:4px}
.sd-u{color:#6ee7b7}.sd-d{color:#fca5a5}

/* Promo cards */
.promo-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:24px 0}
.promo-card{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(245,158,11,.08));border:1px solid rgba(239,68,68,.25);border-radius:var(--r);padding:18px;text-align:center;position:relative;overflow:hidden}
.promo-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(239,68,68,.2),transparent 70%);pointer-events:none}
.promo-card .pc-tag{display:inline-block;background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.promo-card h4{font-size:15px;font-weight:700;margin-bottom:6px}
.promo-card p{font-size:12px;color:var(--dim);line-height:1.4;margin-bottom:10px}
.promo-card .pc-price{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
.promo-card .pc-old{font-size:12px;color:var(--dim);text-decoration:line-through}

@media(max-width:900px){
.g3,.g4{grid-template-columns:repeat(2,1fr)}
.hero-grid{grid-template-columns:1fr}
.hero-vis{height:260px}

.bld{grid-template-columns:1fr}

}

}

function toast(msg){
  const d=document.createElement('div');d.className='toast';d.textContent=msg;
  document.body.appendChild(d);setTimeout(()=>d.remove(),2400);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function catName(id,list){const c=list.find(x=>x.id===id);return c?c.n:id}
function stars(){return (4+Math.random()).toFixed(1)}
function revCnt(){return Math.floor(20+Math.random()*300)}
function formatPrice(p){return p.toLocaleString('ru-RU')+'₽'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function calcBlockPrice(block){
  let price=block.basePrice;
  if(block.config){
    Object.keys(block.config).forEach(k=>{
      const cfgDef=block.cfgDef.find(c=>c.k===k);
      if(cfgDef){
        if(cfgDef.t==='number') price+=block.config[k]*cfgDef.pp;
        else if(cfgDef.t==='bool' && block.config[k]) price+=cfgDef.pp;
      }
    });
  }
  return price;
}

function go(view){

  S.view=view;
  S.selectedBlock=null;
  $$('#mainNav a').forEach(a=>a.classList.toggle('on',a.dataset.nav===view));

  renderView();

  history.replaceState(null,null,'#'+(view==='home'?'':view));
}

function submitRequest(source, product, type){
  const name=$('#ordName').value.trim();
  const contact=$('#ordContact').value.trim();
  const wishes=$('#ordWishes').value.trim();
  const deadline=$('#ordDeadline').value;
  const budget=$('#ordBudget').value;
  const promo=$('#ordPromo').value.trim().toUpperCase();
  
  if(!name||!contact||!wishes){toast('Заполните все обязательные поля');return}
  
  const id=uid().toUpperCase().slice(0,6);
  const request={
    id,
    date:new Date().toISOString(),
    status:'new',
    source,
    product: product || null,
    productType: type || null,
    template: source==='builder' ? null : product,
    blocks: source==='builder' ? S.builder.map(b=>({n:b.n,config:{...b.config}})) : [],
    configSummary: source==='builder' ? S.builder.map(b=>{
      const cfg=Object.keys(b.config).map(k=>{
        const def=b.cfgDef.find(c=>c.k===k);
        if(!def)return null;
        if(def.t==='bool') return b.config[k]?def.l:null;
        return def.l+': '+b.config[k];
      }).filter(Boolean).join(', ');
      return b.n+(cfg?' ('+cfg+')':'');
    }).join('\n') : '',
    price: source==='builder' ? S.builder.reduce((s,b)=>s+calcBlockPrice(b),0) : 0,
    name,
    contact,
    wishes,
    deadline,
    budget,
    promo: promo || null,
    adminNote:''
  };
  
  S.requests.unshift(request);
  S.myorders.unshift({
    id,
    date:request.date,
    status:'new',
    product: product || null,
    template: request.template,
    blocks: request.blocks,
    configSummary: request.configSummary,
    price: request.price,
    wishes,
    contact,
    deadline,
    budget,
    promo: promo || null,
    adminNote:''
  });
  
  if(source==='builder'){
    S.builder=[];
  }
  
  save();
  badges();
  $('#mOrder').classList.remove('open');

  if(tg){
    try{
      tg.sendData(JSON.stringify({
        id,
        product: request.template || request.product || (source==='builder'?'Сборка из конструктора':'Заказ'),
        wishes: wishes + (request.configSummary? ('\n\nБлоки: '+request.configSummary):'') + '\nСроки: '+deadline+'\nБюджет: '+budget,
        contact,
        name,
        price: request.price || 0,
        promo: promo || ''
      }));
    }catch(e){}
  }

  const promoMsg = promo==='ALASKA40' ? ' Промокод ALASKA40 применён! 🎁' : '';
  toast('✓ Заявка #'+id+' отправлена!'+promoMsg);
  go('myorders');
}

function adminSetStatus(id,status){
  const req=S.requests.find(r=>r.id===id);

  if(req) req.status=status;
  if(my) my.status=status;
  save();badges();renderView();

function adminSetNote(id){

function adminDelete(id){

  S.requests=S.requests.filter(r=>r.id!==id);
  S.myorders=S.myorders.filter(o=>o.id!==id);

  toast('Заявка удалена');
}

document.addEventListener('click',e=>{
  const t=e.target.closest('[data-nav]');
  if(t){e.preventDefault();go(t.dataset.nav);return}

  const closeBtn=e.target.closest('[data-close]');
  if(closeBtn){$('#'+closeBtn.dataset.close).classList.remove('open');return}

  if(e.target.classList.contains('modal-bg')){e.target.classList.remove('open');return}

  const prod=e.target.closest('[data-product]');
  if(prod && !e.target.closest('[data-order-product]')){
    openProductModal(prod.dataset.type,prod.dataset.name);return;
  }

  const orderProd=e.target.closest('[data-order-product]');
  if(orderProd){
    $('#mOrder').classList.remove('open');
    openCheckout('product',orderProd.dataset.name,orderProd.dataset.type);
    return;
  }

  const addBlockBtn=e.target.closest('[data-addblock]');
  if(addBlockBtn){
    const blockDef=BLOCKS.find(b=>b.id===addBlockBtn.dataset.addblock);
    if(!blockDef)return;
    const config={};
    blockDef.cfg.forEach(cfg=>{config[cfg.k]=cfg.def});
    S.builder.push({id:blockDef.id,n:blockDef.n,i:blockDef.i,basePrice:blockDef.p,cfgDef:blockDef.cfg,config});
    S.selectedBlock=S.builder.length-1;
    save();renderView();
    toast('✓ '+blockDef.n+' добавлен');
    return;
  }

  const rmBlk=e.target.closest('[data-rmblock]');
  if(rmBlk){e.stopPropagation();S.builder.splice(+rmBlk.dataset.rmblock,1);if(S.selectedBlock>=S.builder.length)S.selectedBlock=S.builder.length-1;save();renderView();return}

  const selBlk=e.target.closest('[data-selectblock]');
  if(selBlk){S.selectedBlock=+selBlk.dataset.selectblock;renderView();return}

  const tpl=e.target.closest('[data-tpl]');
  if(tpl){
    const t=TEMPLATES.find(x=>x.id===tpl.dataset.tpl);
    if(!t)return;
    S.builder=[];
    t.blocks.forEach(bid=>{
      const bd=BLOCKS.find(b=>b.id===bid);
      if(bd){const cfg={};bd.cfg.forEach(c=>{cfg[c.k]=c.def});S.builder.push({id:bd.id,n:bd.n,i:bd.i,basePrice:bd.p,cfgDef:bd.cfg,config:cfg})}
    });
    S.builderTemplate=t.id;
    S.selectedBlock=null;
    save();renderView();
    toast('Шаблон '+t.n+' применён');
    return;
  }

  const cat=e.target.closest('[data-cat]');
  if(cat){S.cat=cat.dataset.cat;renderView();return}
  const gcat=e.target.closest('[data-gcat]');
  if(gcat){S.gcat=gcat.dataset.gcat;renderView();return}
  const macat=e.target.closest('[data-macat]');
  if(macat){S.macat=macat.dataset.macat;renderView();return}

  const atab=e.target.closest('[data-atab]');
  if(atab){S.adminTab=atab.dataset.atab;renderView();return}

  const adminStatus=e.target.closest('[data-admin-status]');
  if(adminStatus){adminSetStatus(adminStatus.dataset.adminStatus,adminStatus.dataset.status);return}
  const adminNote=e.target.closest('[data-admin-note]');
  if(adminNote){adminSetNote(adminNote.dataset.adminNote);return}
  const adminDel=e.target.closest('[data-admin-delete]');
  if(adminDel){adminDelete(adminDel.dataset.adminDelete);return}

  const act=e.target.closest('[data-action]');
  if(act){
    const a=act.dataset.action;
    if(a==='opencheckout'){openCheckout(act.dataset.source);return}
    if(a==='submitrequest'){submitRequest(act.dataset.source,act.dataset.product,act.dataset.type);return}
    if(a==='clearbuild'){if(!S.builder.length||confirm('Очистить сборку?')){S.builder=[];S.selectedBlock=null;S.builderTemplate=null;save();renderView()}return}
    if(a==='openticket'){$('#mTicket').classList.add('open');return}
    if(a==='sendchat'){sendChat();return}
    return;
  }
});

    const blockIdx=+e.target.dataset.cfgBlock;
    const key=e.target.dataset.cfgKey;
    const block=S.builder[blockIdx];
    if(block){
      const cfgDef=block.cfgDef.find(c=>c.k===key);
      if(cfgDef){
        if(cfgDef.t==='number'){let val=parseInt(e.target.value)||cfgDef.min;val=Math.max(cfgDef.min,Math.min(cfgDef.max,val));block.config[key]=val}
        else if(cfgDef.t==='bool'){block.config[key]=e.target.checked}
        save();
        const total=S.builder.reduce((s,b)=>s+calcBlockPrice(b),0);
        const pvEl=$('.pbox .pv');
        if(pvEl) pvEl.textContent=formatPrice(total);
      }
    }
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.id==='chatIn'){e.preventDefault();sendChat()}
});

function sendChat(){
  const inp=$('#chatIn');if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  const msgs=$('#chatMsgs');
  msgs.innerHTML+=`<div class="msg msg-out">${esc(txt)}<div class="msg-tm">сейчас</div></div>`;
  inp.value='';msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{
    const reps=['Привет! Напишите ваш вопрос, я отвечу в течение часа.','Понял, сейчас посмотрю.','Можем обсудить в Telegram — напишите ваш @username.','Да, это возможно. Давайте уточним детали.','Отправил информацию на почту.'];
    msgs.innerHTML+=`<div class="msg msg-in">${reps[Math.floor(Math.random()*reps.length)]}<div class="msg-tm">сейчас</div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  },800);
}

$('#btnSubmitTicket').addEventListener('click',()=>{
  const subj=$('#tSubj').value.trim();
  const text=$('#tText').value.trim();
  if(!subj||!text){toast('Заполните все поля');return}
  S.tickets.unshift({id:uid().slice(-6),date:new Date().toISOString(),subj,status:'open'});
  save();$('#tSubj').value='';$('#tText').value='';
  $('#mTicket').classList.remove('open');
  toast('✓ Тикет создан');renderView();
});

function init(){
  initNav();badges();
  const h=location.hash.replace('#','');
  go(VIEWS.includes(h)?h:'home');
  // Анимация слотов
  setInterval(()=>{
    const el=$('#slotsLeft');
    if(el && Math.random()<0.3){
      const cur=parseInt(el.textContent);
      if(cur>3) el.textContent=cur-1;
    }
  },15000);
}
init();
</script>
